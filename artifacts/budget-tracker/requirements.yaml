packages:
  "recharts": "Required for all financial charts (pie, bar, line) on dashboard and reports"
  "framer-motion": "For premium page transitions, list animations, and interactive component feedback"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to merge tailwind classes safely"
  "date-fns": "For elegant date formatting and manipulation across the app"
  "@radix-ui/react-slot": "For polymorphic components"
  "lucide-react": "For beautiful, consistent iconography across the application"

images:
  - path: "artifacts/budget-tracker/public/images/avatar.png"
    description: "A professional, stylized 3D illustrated avatar of a smiling person, soft lighting, solid blue background"
    aspect_ratio: "1:1"
  - path: "artifacts/budget-tracker/public/images/empty-state.png"
    description: "A beautiful, minimalist 3D illustration of a floating wallet with coins and a magnifying glass, soft lighting, pastel blue and white colors"
    aspect_ratio: "1:1"

notes:
  - Application uses a robust React Context (Mock Data Store) for all state management to ensure full interactivity without a backend, as requested by the user.
  - All charts and data visualizations are fully wired to this dynamic state.
